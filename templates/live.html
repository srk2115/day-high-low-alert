<!DOCTYPE html>
<html>

<head>
    <title>Live</title>

    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }

        .alert {
            color: red;
            font-size: 22px;
            font-weight: bold;
        }

        .candle {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
        }

        input {
            width: 500px;
            padding: 8px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            font-size: 16px;
        }

        .success {
            color: green;
        }
    </style>

</head>

<body>

    <h2>Live</h2>
    <div>
        <button disabled>Live</button>
        <button onclick="javascript:window.location= '/backtest'">Backtest</button>
    </div>

    <h3>Trading View Setup</h3>

    <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
        
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        
        <button onclick="save_tv()">Save Trading View Setup</button>

    </div>
    <!-- <label for="user">Username:</label>
    <input type="text" id="user" name="username" required>
    
    <label for="pass">Password:</label>
    <input type="password" id="pass" name="password" required>
    <button onclick="save_tv()">Save Trading View Setup</button> -->


    <h3>Pushbullet Setup</h3>

    <input
        type="text"
        id="pushbulletToken"
        placeholder="Enter Pushbullet Access Token">

    <button onclick="saveToken()">
         Save Token
    </button>
    <button onclick="testPushbullet()">
        Test Pushbullet
    </button>
    <button onclick="get_live_data()">
        Start Live
    </button>

    <div id="tokenStatus" class="success"></div>


    <hr>
    <h3>Reference Candle</h3>
    <div id="first_high">High:</div>
    <div id="first_low">Low:</div>

    <div class="candle">

        <div id="datetime"></div>
        <div id="ohlc"></div>

    </div>
    <div id="error_message" class="alert alert-danger">
        
    </div>


    <div id="alert" class="alert"></div>

    <script>
        async function save_tv() {

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            if(!username.trim() || !password.trim())
            {
                alert("Username or Password cannot be blank.");
                return;
            }

            const response =
                await fetch('/save_tv', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

            const result = await response.json();

            document.getElementById("tokenStatus")
                .innerHTML = result.message;
        }

        async function saveToken() {

            const token =
                document.getElementById("pushbulletToken").value;

            const response =
                await fetch('/save_token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token
                    })
                });

            const result = await response.json();

            document.getElementById("tokenStatus")
                .innerHTML = result.message;
        }

        async function nextCandle() {

            const response =
                await fetch('/next');

            const data =
                await response.json();

            if (data.finished) {

                document.getElementById("alert")
                    .innerHTML = "Replay Finished";

                return;
            }

            document.getElementById("datetime")
                .innerHTML = data.datetime;

            document.getElementById("ohlc")
                .innerHTML =
                `
                Open : ${data.open}<br>
                High : ${data.high}<br>
                Low : ${data.low}<br>
                Close : ${data.close}
                `;

            document.getElementById("alert")
                .innerHTML = data.alert ?? "";
        }
        
        async function get_live_data() {

            // 1. Define a named helper function containing the payload logic
            async function fetchAndUpdateUI() {
                try {
                    const response = await fetch('/get_live_data');
                    const data = await response.json();
                    console.log(data);

                    if (data.finished) {
                        document.getElementById("alert").innerHTML = "Replay Finished";
                        
                        // Clear the interval to stop future hits to your endpoint
                        clearInterval(liveDataInterval);
                        return;
                    }

                    document.getElementById("error_message").innerHTML = `${data.error_message}`;
                    document.getElementById("first_high").innerHTML = `High: ${data.first_high}`;
                    document.getElementById("first_low").innerHTML = `Low: ${data.first_low}`;
                    document.getElementById("datetime").innerHTML = data.datetime;

                    document.getElementById("ohlc").innerHTML = `
                        Current Date Time: ${new Date().toLocaleString()}<br>
                        Open : ${data.open}<br>
                        High : ${data.high}<br>
                        Low : ${data.low}<br>
                        Close : ${data.close}
                    `;

                    document.getElementById("alert").innerHTML = data.alert ?? "";
                } catch (error) {
                    console.error("Error pulling live streaming candle data:", error);
                }
            }

            // 2. Call it IMMEDIATELY the first time
            await fetchAndUpdateUI();

            // 3. Set up the interval loop to fire every 15 seconds thereafter
            const liveDataInterval = setInterval(fetchAndUpdateUI, 15000);
        }

        async function get_live_dataA() {

            setInterval(async () => {
                const response = await fetch('/get_live_data');

                const data =
                    await response.json();

                console.log(data);

                if (data.finished) {

                    document.getElementById("alert")
                        .innerHTML = "Replay Finished";

                    return;
                }

                // console.log("${data.first_high}, ${data.first_lov}");
                document.getElementById("error_message").innerHTML = `${data.error_message}`;
                document.getElementById("first_high").innerHTML = `High: ${data.first_high}`;
                document.getElementById("first_low").innerHTML = `Low: ${data.first_low}`;

                document.getElementById("datetime")
                    .innerHTML = data.datetime;

                document.getElementById("ohlc")
                    .innerHTML =
                    `
                    Current Date Time: ${new Date().toLocaleString()}<br>
                    Open : ${data.open}<br>
                    High : ${data.high}<br>
                    Low : ${data.low}<br>
                    Close : ${data.close}
                    `;

                document.getElementById("alert")
                    .innerHTML = data.alert ?? "";
                
            }, 15000);
        }

        async function testPushbullet() {

            const response =
                await fetch('/test_pushbullet');

            const result =
                await response.json();

            alert(result.message);
        }        

    </script>

</body>

</html>
